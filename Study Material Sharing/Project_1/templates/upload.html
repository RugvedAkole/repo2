{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Material | EduShare</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background-color: #f8fafc;">
    <nav class="navbar">
        <div class="container nav-content">
            <a href="{% url 'index' %}" class="logo">
                <div class="logo-icon"><i data-lucide="book-open"></i></div>
                <span>EduShare</span>
            </a>
            <div class="nav-links">
                <a href="{% url 'browse' %}" class="nav-link">Browse Library</a>
                <a href="{% url 'index' %}" class="nav-link">Home</a>
                <div class="user-profile-sm">
                    <span class="nav-link"><strong>{{ user.username }}</strong></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container auth-wrapper">
        <div class="auth-card" style="max-width: 100%; text-align: left;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 class="gradient-text" style="font-size: 2rem; margin-bottom: 10px;">Share Knowledge</h1>
                <p style="color: var(--text-muted);">Upload your notes or papers to help the community.</p>
            </div>

            <form method="POST" enctype="multipart/form-data" id="upload-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Select Document (PDF only)</label>
                    <div class="drop-zone" id="drop-zone" style="border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s;">
                        <input type="file" name="file" id="file-input" hidden accept=".pdf" required>
                        <i data-lucide="upload-cloud" style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 10px;"></i>
                        <p id="file-name" style="font-weight: 600; color: var(--text-main);">Click to browse or drag & drop</p>
                        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Maximum file size: 10MB</p>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="type"></i>
                        <label for="title">Document Title</label>
                        <input type="text" name="title" id="title" placeholder="e.g. Data Structures Unit 1 Notes" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i data-lucide="book"></i>
                            <label for="subject">Subject</label>
                            <input type="text" name="subject" id="subject" placeholder="e.g. Computer Science" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <i data-lucide="tag">Category</i>
                            <label class="form-group">Category</label>
                            <select name="category" class="form-input" required>
                                <option value="Category" disabled selected>Select Category</option>
                                <option value="Notes">Notes</option>
                                <option value="Paper">previous year Paper</option>
                                <option value="Assignment">class Assignment</option>
                                <option value="Practical">Practical</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                <label class="form-group">Semester</label>
                <select name="semester" class="form-input" required>
                    <option value="" disabled selected>Select Semester</option>
                    <option value="Sem 1">Semester 1</option>
                    <option value="Sem 2">Semester 2</option>
                    <option value="Sem 3">Semester 3</option>
                    <option value="Sem 4">Semester 4</option>
                    <option value="Sem 5">Semester 5</option>
                    <option value="Sem 6">Semester 6</option>
                    <option value="Sem 7">Semester 7</option>
                    <option value="Sem 8">Semester 8</option>
                </select>
            </div>

                <div class="form-group">
                    <label for="description">Brief Description</label>
                    <textarea name="description" id="description" rows="4" placeholder="What is this document about?" style="width: 100%; border-radius: 12px; border: 2px solid var(--border); padding: 12px; font-family: inherit; resize: none;"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px; height: 50px; font-size: 1.1rem;">
                    <i data-lucide="check-circle"></i> Publish to Library
                </button>
            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Drag and Drop Logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerHTML = `<span style="color: var(--success)">✓ ${fileInput.files[0].name}</span>`;
                dropZone.style.borderColor = 'var(--success)';
                dropZone.style.background = '#f0fdf4';
            }
        };

        dropZone.ondragover = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            dropZone.style.background = 'var(--primary-light)';
        };

        dropZone.ondragleave = () => {
            dropZone.style.borderColor = 'var(--border)';
            dropZone.style.background = 'transparent';
        };

        dropZone.ondrop = (e) => {
            e.preventDefault();
            fileInput.files = e.dataTransfer.files;
            fileInput.onchange();
        };
    </script>
</body>
</html>
