{% extends 'dashboard/dashboard_base.html' %}

{% block admin_content %}
<style>
    .card-container { display: flex; gap: 20px; margin-bottom: 30px; }
    .stat-card { flex: 1; padding: 30px; color: white; border-radius: 4px; text-align: center; }
    .bg-blue { background: #3498db; }
    .bg-green { background: #2ecc71; }
    .bg-orange { background: #f39c12; }
</style>

<div class="card-container">
    <div class="stat-card bg-blue">
        <h3>Dashboard</h3>
        <p>Main Overview</p>
    </div>
    <div class="stat-card bg-green">
        <h3>{{ total_users }}</h3>
        <p>Total Registered Users</p>
    </div>
    <div class="stat-card bg-orange">
        <h3>Reports</h3>
        <p>Generation</p>
    </div>
</div>

<div style="background: white; padding: 20px; border-radius: 8px;">
    <h2>Welcome, {{ user.username }}</h2>
    <p>Manage your Study Material Sharing platform from this custom portal.</p>
</div>
{% endblock %}
